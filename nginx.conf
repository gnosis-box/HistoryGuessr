server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Required for Circles / Gnosis miniapp iframe embedding
    add_header Content-Security-Policy "frame-ancestors 'self' https://*.gnosis.io https://circles.gnosis.io https://circles-dev.gnosis.io https://*.gnosis.box https://*.thp.gnosis.box" always;
    add_header X-Frame-Options "" always;
}
